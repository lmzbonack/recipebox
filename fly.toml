# fly.toml app configuration file generated for recipebox on 2026-03-04T21:22:51-08:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'recipebox'
primary_region = 'sjc'
kill_signal = 'SIGTERM'

[build]

[env]
  DATABASE_PATH = "/mnt/sqlite/myapp.db"
  PHX_HOST = 'recipebox.fly.dev'
  PORT = '8080'
  CLOUDFLARE_ACCOUNT_ID = ''
  CLOUDFLARE_API_TOKEN = ''

[mounts]
  source = "sqlite"
  destination = "/mnt/sqlite"
  auto_extend_size_threshold = 80
  auto_extend_size_increment = '1GB'
  auto_extend_size_limit = '10GB'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

  [http_service.concurrency]
    type = 'connections'
    hard_limit = 1000
    soft_limit = 1000

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024
